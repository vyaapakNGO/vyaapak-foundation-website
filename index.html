<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vyaapak Foundation - Under Maintenance</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f5f7fa;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            text-align:center;
            color:#333;
        }

        .container{
            max-width:800px;
            padding:20px;
        }

        .logo{
            width:350px;
            max-width:90%;
            margin-bottom:30px;
        }

        h1{
            color:#0b4fb3;
            font-size:42px;
            margin-bottom:15px;
        }

        p{
            font-size:20px;
            line-height:1.6;
            color:#555;
        }

        .highlight{
            color:#0b4fb3;
            font-weight:bold;
        }

        @media (max-width:768px){
            h1{
                font-size:32px;
            }

            p{
                font-size:18px;
            }

            .logo{
                width:250px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Vyaapak Foundation Logo" class="logo">

        <h1>Website Under Maintenance</h1>

        <p>
            We are currently working on improving our website to serve you better.
            Please visit again soon.
        </p>

        <br>

        <p class="highlight">
            Vyaapak Foundation<br>
            Creating A Positive Change
        </p>
    </div>

</body>
</html>
